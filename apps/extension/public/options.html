<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>nextslide — Settings</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 20px;
        background: #0a0a0a;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
      }
      .logo {
        font-family: monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #52525b;
        text-transform: uppercase;
        margin-bottom: 20px;
      }
      h1 { font-size: 16px; font-weight: 600; margin: 0 0 16px; }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #71717a;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 9px 12px;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 8px;
        color: #fafafa;
        font-size: 13px;
        font-family: monospace;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus { border-color: #3f3f46; }
      .hint { font-size: 11px; color: #52525b; margin-top: 5px; }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px;
        background: #22c55e;
        color: #000;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.1s;
      }
      button:hover { opacity: 0.9; }
      #status { font-size: 12px; color: #22c55e; min-height: 16px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="logo">nextslide.app</div>
    <h1>Settings</h1>

    <label for="relay-url">Relay server URL</label>
    <input id="relay-url" type="text" placeholder="wss://nextslide.app" spellcheck="false" />
    <p class="hint">Leave blank to use the default (wss://nextslide.app). For self-hosting, enter your own server URL.</p>

    <button id="save">Save</button>
    <div id="status"></div>

    <script type="module" src="./options.js"></script>
  </body>
</html>
